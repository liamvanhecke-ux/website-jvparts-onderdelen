<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JV-Parts Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    (function () {

      var previewStyles = `
        .jv-pane { font-family: 'Segoe UI', system-ui, sans-serif; color:#222; padding:20px; }
        .jv-head { display:flex; align-items:center; justify-content:space-between;
                   margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid #e6e3dc; }
        .jv-head-title { font-size:1.05rem; font-weight:700; color:#15243d; }
        .jv-head-count { font-size:.78rem; font-weight:600; color:#b8893f; background:#fbf0d8;
                         padding:4px 11px; border-radius:20px; white-space:nowrap; }
        .jv-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:16px; }
        .jv-card { background:#fff; border:1px solid #e6e3dc; border-radius:14px; overflow:hidden;
                   box-shadow:0 1px 3px rgba(21,36,61,.05); }
        .jv-img { aspect-ratio:1; display:flex; align-items:center; justify-content:center;
                  color:#b9bdc4; font-size:.75rem; letter-spacing:.3px;
                  background:repeating-linear-gradient(45deg,#f1f2f4 0 10px,#eef0f2 10px 20px); }
        .jv-photo { width:100%; height:100%; object-fit:cover; display:block; }
        .jv-body { padding:16px 16px 18px; }
        .jv-badge { display:inline-block; font-size:.68rem; font-weight:600; padding:3px 9px;
                    border-radius:6px; margin-bottom:8px; color:#15243d; background:#eef1f6; }
        .jv-name { font-size:1.05rem; font-weight:600; color:#15243d; line-height:1.2; }
        .jv-sub { font-size:.9rem; color:#8a8f98; margin-top:3px; min-height:1em; }
        .jv-foot { display:flex; align-items:center; justify-content:space-between;
                   margin-top:14px; padding-top:14px; border-top:1px solid #eceae4; }
        .jv-price { font-size:1.15rem; font-weight:700; color:#15243d; }
        .jv-add { background:#15243d; color:#fff; border:none; border-radius:8px;
                  padding:8px 12px; font-size:.76rem; font-weight:600; cursor:default; }
        .jv-empty { padding:48px 20px; text-align:center; color:#8a8f98; }
      `;
      CMS.registerPreviewStyle(previewStyles, { raw: true });


      var ProductenPreview = createClass({
        render: function () {
          var entry = this.props.entry;
          var getAsset = this.props.getAsset;
          var products = entry.getIn(['data', 'products']);
          var list = products ? products.toArray() : [];

          if (list.length === 0) {
            return h('div', { className: 'jv-pane' },
              h('div', { className: 'jv-empty' },
                'Nog geen producten. Klik links op "+ Voeg producten toe" om te starten.')
            );
          }

          var cards = list.map(function (p, i) {
            var name = p.get('name') || 'Naamloos product';
            var sub = p.get('subtitle') || '';
            var price = p.get('price') || '–';
            var cat = p.get('category') || '';
            var image = p.get('image');

            var imgEl;
            if (image) {
              var src = '';
              try { src = getAsset(image); } catch (e) { src = ''; }
              imgEl = h('img', { className: 'jv-photo', src: src, alt: name });
            } else {
              imgEl = h('span', null, 'geen foto');
            }

            return h('div', { className: 'jv-card', key: i },
              h('div', { className: 'jv-img' }, imgEl),
              h('div', { className: 'jv-body' },
                cat ? h('span', { className: 'jv-badge' }, cat) : null,
                h('div', { className: 'jv-name' }, name),
                h('div', { className: 'jv-sub' }, sub),
                h('div', { className: 'jv-foot' },
                  h('span', { className: 'jv-price' }, '\u20AC ' + price),
                  h('button', { className: 'jv-add' }, '+ Voeg toe')
                )
              )
            );
          });

          return h('div', { className: 'jv-pane' },
            h('div', { className: 'jv-head' },
              h('div', { className: 'jv-head-title' }, 'Voorvertoning winkel'),
              h('div', { className: 'jv-head-count' }, list.length + ' producten')
            ),
            h('div', { className: 'jv-grid' }, cards)
          );
        }
      });


      CMS.registerPreviewTemplate('winkel', ProductenPreview);
      CMS.registerPreviewTemplate('producten', ProductenPreview);
    })();
  </script>
</body>

</html>
