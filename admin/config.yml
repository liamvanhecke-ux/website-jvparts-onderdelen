backend:
  name: git-gateway
  branch: main

media_folder: "images/products"
public_folder: "/images/products"

locale: "nl"

collections:
  - name: "winkel"
    label: "Winkel"
    files:
      - name: "producten"
        label: "Producten beheren"
        file: "data/products.json"
        description: "Voeg producten toe, pas ze aan, sleep om te herordenen of verwijder met de ✕. Rechts zie je meteen hoe het in de winkel toont."
        fields:
          - label: "Producten"
            name: "products"
            widget: "list"
            label_singular: "Product"
            summary: "{{fields.name}} — €{{fields.price}}"
            add_to_top: true
            fields:
              - label: "Naam"
                name: "name"
                widget: "string"
                hint: "Bijv. Cilinderset 50cc"
              - label: "Merk / Subtitel"
                name: "subtitle"
                widget: "string"
                hint: "Bijv. Honda / Peugeot of Universeel"
              - label: "Prijs"
                name: "price"
                widget: "string"
                hint: "Alleen het bedrag, met komma. Bijv. 34,95 — het euroteken wordt automatisch getoond."
                pattern:
                  ['^\d+([.,]\d{1,2})?$', "Gebruik enkel cijfers, bijv. 34,95"]
              - label: "Categorie"
                name: "category"
                widget: "relation"
                collection: "winkel"
                file: "categorieen"
                search_fields: ["categories.*.name"]
                value_field: "categories.*.name"
                display_fields: ["categories.*.name"]
                required: false
                hint: "Kies een categorie. Een nieuwe categorie nodig? Voeg ze toe onder 'Categorieën' (links in het menu)."
              - label: "Afbeelding"
                name: "image"
                widget: "image"
                required: false
                hint: "Optioneel. Geen foto? Dan toont de site een nette placeholder."

      - name: "categorieen"
        label: "Categorieën"
        file: "data/categories.json"
        description: "Voeg hier categorieën toe of verwijder ze. Ze verschijnen automatisch als filterknop op de site én als keuze bij een product."
        fields:
          - label: "Categorieën"
            name: "categories"
            widget: "list"
            label_singular: "Categorie"
            summary: "{{fields.name}}"
            fields:
              - label: "Naam"
                name: "name"
                widget: "string"
                hint: "Bijv. Banden of Verlichting"
