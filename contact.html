<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/images/favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="/images/jv-parts-tab.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@29.0.1/build/css/intlTelInput.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JV-Parts</title>
</head>

<body>
    <div id="overlay"></div>
    <aside id="sidebar">
        <div class="sidebar-logo">JV<span>Parts</span></div>
        <nav>
            <a href="#" class="active">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" />
                    <path d="M9 21V12h6v9" />
                </svg> Homepagina </a>
            <a href="#">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="8" r="4" />
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                </svg> Account </a>
            <a href="#">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg> Contact </a>
            <a href="#" id="sidebar-cart-link">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="9" cy="21" r="1" />
                    <circle cx="20" cy="21" r="1" />
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                </svg> Winkelmand <span class="cart-badge" id="cart-count-sidebar">0</span>
            </a>
        </nav>
        <div class="sidebar-close" id="sidebar-close">✕ &nbsp;Sluit menu</div>
    </aside>
    <header id="topbar">
        <button id="hamburger" aria-label="Menu openen">
            <span></span><span></span><span></span>
        </button>
        <div class="topbar-brand">JV Parts</div>
        <div class="topbar-search">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" placeholder="Zoek onderdelen...">
        </div>
        <a href="#" class="topbar-cart" aria-label="Winkelmand">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="9" cy="21" r="1" />
                <circle cx="20" cy="21" r="1" />
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
            </svg>
            <span class="dot" id="cart-count-top">0</span>
        </a>
    </header>
    <div class="form-wrapper">
        <form action="">
            <div class="mb-3 mt-3">
                <label for="naam" class="form-label">Voornaam & achternaam:</label>
                <input type="text" class="form-control" id="naam" placeholder="Vul voornaam & achternaam in"
                       name="naam">
            </div>
            <div class="mb-3 mt-3">
                <label for="email" class="form-label">Email:</label>
                <input type="email" class="form-control" id="email" placeholder="Vul email in" name="email">
            </div>
            <div class="mb-3 mt-3">
                <label class="form-label">Telefoon:</label>
                <div class="tel-group">
                    <div class="land-dropdown" id="landDropdown">
                        <button type="button" class="land-knop" id="landKnop">
                            <img src="images/belgium.png" alt=""> <span id="landCode">+32</span>
                            <span class="pijl">▾</span>
                        </button>
                        <ul class="land-lijst" id="landLijst">
                            <li data-code="+32"><img src="images/belgium.png" alt=""> BE +32</li>
                            <li data-code="+31"><img src="images/netherlands.png" alt=""> NL +31</li>
                            <li data-code="+33"><img src="images/france (1).png" alt=""> FR +33</li>
                            <li data-code="+49"><img src="images/germany.png" alt=""> DE +49</li>
                        </ul>
                    </div>
                    <input type="hidden" id="landcode" name="landcode" value="+32">
                    <input type="tel" id="telefoon" name="telefoon" class="form-control" placeholder="470 12 34 56">
                </div>
            </div>
            <button type="submit" class="btn btn-primary">verzenden</button>
            <script>
                const knop = document.getElementById("landKnop");
                const lijst = document.getElementById("landLijst");
                const codeEl = document.getElementById("landCode");
                const hidden = document.getElementById("landcode");


                knop.addEventListener("click", function () {
                    lijst.classList.toggle("open");
                });


                lijst.querySelectorAll("li").forEach(function (li) {
                    li.addEventListener("click", function () {
                        const code = li.dataset.code;
                        codeEl.textContent = code;
                        hidden.value = code;
                        knop.querySelector("img").src = li.querySelector("img").src;
                        lijst.classList.remove("open");
                    });
                });


                document.addEventListener("click", function (e) {
                    if (!document.getElementById("landDropdown").contains(e.target)) {
                        lijst.classList.remove("open");
                    }
                });
            </script>
        </form>
    </div>
</body>

</html>
